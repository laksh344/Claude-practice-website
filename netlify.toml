[build]
  command = "npm run build"
  publish = "dist"

# SPA history-API fallback: deep links and refresh resolve to the app shell.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache immutable, content-hashed assets.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
